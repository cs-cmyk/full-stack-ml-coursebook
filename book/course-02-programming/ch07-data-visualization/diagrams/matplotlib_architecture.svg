<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    Matplotlib Object-Oriented Architecture
  </text>

  <!-- Figure Container (outer box) -->
  <rect x="50" y="60" width="700" height="400" fill="#ecf0f1" stroke="#2196F3" stroke-width="3" rx="5"/>
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2196F3">
    Figure (Canvas)
  </text>
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="12" fill="#607D8B">
    fig = plt.figure()
  </text>

  <!-- Axes 1 (subplot 1) -->
  <rect x="70" y="130" width="320" height="300" fill="#fff" stroke="#4CAF50" stroke-width="3" rx="3"/>
  <text x="80" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4CAF50">
    Axes 1 (Subplot)
  </text>
  <text x="80" y="175" font-family="Arial, sans-serif" font-size="11" fill="#607D8B">
    ax1 = fig.add_subplot(1, 2, 1)
  </text>

  <!-- Plot area for Axes 1 -->
  <rect x="90" y="190" width="280" height="200" fill="#f8f9fa" stroke="#9C27B0" stroke-width="2" stroke-dasharray="5,5" rx="2"/>

  <!-- X-Axis 1 -->
  <line x1="90" y1="390" x2="370" y2="390" stroke="#FF9800" stroke-width="3"/>
  <text x="230" y="410" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF9800" text-anchor="middle">
    X-Axis (ax1.xaxis)
  </text>

  <!-- Y-Axis 1 -->
  <line x1="90" y1="190" x2="90" y2="390" stroke="#F44336" stroke-width="3"/>
  <text x="82" y="290" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F44336" text-anchor="end">
    Y-Axis
  </text>
  <text x="82" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F44336" text-anchor="end">
    (ax1.yaxis)
  </text>

  <!-- Artists in Axes 1 (sample plot elements) -->
  <!-- Line -->
  <polyline points="110,350 150,300 190,320 230,250 270,280 310,230"
            fill="none" stroke="#2196F3" stroke-width="2"/>
  <circle cx="150" cy="300" r="4" fill="#2196F3"/>
  <circle cx="230" cy="250" r="4" fill="#2196F3"/>

  <!-- Text annotation -->
  <text x="180" y="230" font-family="Arial, sans-serif" font-size="9" fill="#9C27B0">
    Artists (lines, text, patches)
  </text>

  <!-- Axes 2 (subplot 2) -->
  <rect x="410" y="130" width="320" height="300" fill="#fff" stroke="#4CAF50" stroke-width="3" rx="3"/>
  <text x="420" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4CAF50">
    Axes 2 (Subplot)
  </text>
  <text x="420" y="175" font-family="Arial, sans-serif" font-size="11" fill="#607D8B">
    ax2 = fig.add_subplot(1, 2, 2)
  </text>

  <!-- Plot area for Axes 2 -->
  <rect x="430" y="190" width="280" height="200" fill="#f8f9fa" stroke="#9C27B0" stroke-width="2" stroke-dasharray="5,5" rx="2"/>

  <!-- X-Axis 2 -->
  <line x1="430" y1="390" x2="710" y2="390" stroke="#FF9800" stroke-width="3"/>
  <text x="570" y="410" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF9800" text-anchor="middle">
    X-Axis (ax2.xaxis)
  </text>

  <!-- Y-Axis 2 -->
  <line x1="430" y1="190" x2="430" y2="390" stroke="#F44336" stroke-width="3"/>
  <text x="422" y="290" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F44336" text-anchor="end">
    Y-Axis
  </text>
  <text x="422" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F44336" text-anchor="end">
    (ax2.yaxis)
  </text>

  <!-- Artists in Axes 2 (bars) -->
  <rect x="470" y="280" width="40" height="110" fill="#4CAF50" opacity="0.7"/>
  <rect x="520" y="240" width="40" height="150" fill="#4CAF50" opacity="0.7"/>
  <rect x="570" y="300" width="40" height="90" fill="#4CAF50" opacity="0.7"/>
  <rect x="620" y="220" width="40" height="170" fill="#4CAF50" opacity="0.7"/>

  <!-- Legend -->
  <g transform="translate(50, 475)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">
      Key Components:
    </text>
    <rect x="150" y="-10" width="15" height="10" fill="#2196F3" stroke="#2196F3" stroke-width="2"/>
    <text x="170" y="0" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
      Figure (container)
    </text>

    <rect x="290" y="-10" width="15" height="10" fill="#fff" stroke="#4CAF50" stroke-width="2"/>
    <text x="310" y="0" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
      Axes (plot area)
    </text>

    <line x1="440" y1="-5" x2="455" y2="-5" stroke="#FF9800" stroke-width="2"/>
    <text x="460" y="0" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
      Axis (x/y)
    </text>

    <circle cx="590" cy="-5" r="4" fill="#2196F3"/>
    <text x="600" y="0" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">
      Artists (elements)
    </text>
  </g>
</svg>
