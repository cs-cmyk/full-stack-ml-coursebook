<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .stage-box { fill: #e1f5ff; stroke: #2196F3; stroke-width: 2; }
      .stage2-box { fill: #fff4e1; stroke: #FF9800; stroke-width: 2; }
      .stage3-box { fill: #e8f5e9; stroke: #4CAF50; stroke-width: 2; }
      .process-box { fill: white; stroke: #607D8B; stroke-width: 2; rx: 5; }
      .title-text { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .label-text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .small-text { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
      .arrow { stroke: #607D8B; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-kl { stroke: #9C27B0; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead-purple); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#607D8B" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9C27B0" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title-text" style="font-size: 18px;">RLHF Pipeline Architecture</text>

  <!-- Stage 1: Supervised Fine-Tuning -->
  <rect x="50" y="60" width="280" height="140" class="stage-box"/>
  <text x="190" y="85" text-anchor="middle" class="title-text">Stage 1: Supervised Fine-Tuning</text>

  <rect x="70" y="100" width="240" height="35" class="process-box"/>
  <text x="190" y="122" text-anchor="middle" class="label-text">Pretrained LM θ₀</text>

  <rect x="70" y="150" width="240" height="35" class="process-box"/>
  <text x="190" y="172" text-anchor="middle" class="label-text">Fine-tuned Model θ_SFT</text>

  <path d="M 190 135 L 190 150" class="arrow"/>

  <!-- Stage 2: Reward Model Training -->
  <rect x="360" y="60" width="300" height="220" class="stage2-box"/>
  <text x="510" y="85" text-anchor="middle" class="title-text">Stage 2: Reward Model Training</text>

  <rect x="380" y="100" width="260" height="35" class="process-box"/>
  <text x="510" y="122" text-anchor="middle" class="label-text">Generate Multiple Responses</text>

  <rect x="380" y="150" width="260" height="35" class="process-box"/>
  <text x="510" y="172" text-anchor="middle" class="label-text">Human Annotators</text>

  <rect x="380" y="200" width="260" height="35" class="process-box"/>
  <text x="510" y="215" text-anchor="middle" class="small-text">Preference Dataset:</text>
  <text x="510" y="228" text-anchor="middle" class="small-text">chosen vs rejected</text>

  <rect x="380" y="250" width="260" height="35" class="process-box"/>
  <text x="510" y="272" text-anchor="middle" class="label-text">Reward Model r_φ</text>

  <path d="M 510 135 L 510 150" class="arrow"/>
  <path d="M 510 185 L 510 200" class="arrow"/>
  <path d="M 510 235 L 510 250" class="arrow"/>

  <!-- Stage 3: PPO Fine-Tuning -->
  <rect x="50" y="320" width="610" height="240" class="stage3-box"/>
  <text x="355" y="345" text-anchor="middle" class="title-text">Stage 3: PPO Fine-Tuning</text>

  <rect x="70" y="365" width="180" height="35" class="process-box"/>
  <text x="160" y="387" text-anchor="middle" class="label-text">Reference Model π_ref</text>

  <rect x="290" y="365" width="180" height="35" class="process-box"/>
  <text x="380" y="387" text-anchor="middle" class="label-text">Policy Model π_θ</text>

  <rect x="70" y="420" width="180" height="35" class="process-box"/>
  <text x="160" y="442" text-anchor="middle" class="label-text">Prompts</text>

  <rect x="290" y="420" width="180" height="35" class="process-box"/>
  <text x="380" y="442" text-anchor="middle" class="label-text">Generated Responses</text>

  <rect x="510" y="420" width="130" height="35" class="process-box"/>
  <text x="575" y="442" text-anchor="middle" class="label-text">Reward Scores</text>

  <rect x="290" y="480" width="180" height="35" class="process-box"/>
  <text x="380" y="502" text-anchor="middle" class="label-text">PPO Update</text>

  <!-- Stage 3 arrows -->
  <path d="M 160 400 L 380 420" class="arrow"/>
  <path d="M 470 437 L 510 437" class="arrow"/>
  <path d="M 575 285 L 575 420" class="arrow"/>
  <path d="M 575 455 L 575 470 L 470 470 L 470 480" class="arrow"/>
  <path d="M 380 480 L 380 455" class="arrow"/>

  <!-- KL Penalty dashed line -->
  <path d="M 250 382 L 290 382" class="arrow-kl"/>
  <text x="270" y="375" text-anchor="middle" class="small-text" fill="#9C27B0">KL Penalty</text>

  <!-- Connections between stages -->
  <path d="M 190 200 L 190 300 L 160 300 L 160 365" class="arrow"/>
  <path d="M 210 200 L 210 310 L 380 310 L 380 365" class="arrow"/>

  <!-- Legend -->
  <text x="50" y="585" class="small-text">SFT provides the initial policy, which becomes both reference and trainable models in Stage 3</text>
</svg>
